query ListDevices(
  $pagination: OffsetPaginationInput
  $filters: ManagementDeviceFilter
  $ordering: [ManagementDeviceOrdering!]
) {
  devices(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListDevice
  }
}

query GetDevice($id: ID!) {
  device(id: $id) {
    ...DetailDevice
  }
}
