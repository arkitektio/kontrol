query ListDeviceGroups(
  $pagination: OffsetPaginationInput
  $filters: ManagementDeviceGroupFilter
  $ordering: [ManagementDeviceGroupOrdering!]

) {
  deviceGroups(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListDeviceGroup
  }
}

query GetDeviceGroup($id: ID!) {
  deviceGroup(id: $id) {
    ...DetailDeviceGroup
  }
}
