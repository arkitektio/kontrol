query ListKommunityPartner(
  $pagination: OffsetPaginationInput
  $filters: ManagementKommunityPartnerFilter
  $ordering: [ManagementKommunityPartnerOrdering!]
) {
  kommunityPartners(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListKommunityPartner
  }
}

query GetKommunityPartner($id: ID!) {
  kommunityPartner(id: $id) {
    ...KommunityPartner
  }
}
