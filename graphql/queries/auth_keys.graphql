query IonscaleAuthKey($filters: ManagementIonscaleAuthKeyFilter, $pagination: OffsetPaginationInput, $ordering: [ManagementIonscaleAuthKeyOrdering!]) {
  ionscaleAuthKeys(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...IonscaleAuthKey
  }
}

query GetAuthKey($id: ID!) {
  ionscaleAuthKey(id: $id) {
    ...IonscaleAuthKey
  }
}
