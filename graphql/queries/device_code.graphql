query DeviceCodeByCode($code: String!) {
  deviceCodeByCode(deviceCode: $code) {
    ...DeviceCode
  }
}

query ValidateDeviceCode($deviceCode: ID!, $hub: ID!) {
  validateDeviceCode(deviceCode: $deviceCode, hub: $hub) {
    valid
    reason
    existingDevice {
      id
      name
    }
    mappings {
      key
      serviceInstance {
        id
        identifier
      }
    }
  }
}
