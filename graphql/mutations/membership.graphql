
mutation UpdateMembership($input: UpdateMembershipInput!) {
  updateMembership(input: $input) {
    ...Membership
  }
}

mutation DeleteMembership($input: DeleteMembershipInput!) {
  deleteMembership(input: $input)
}

mutation SetMembershipBrandHue($input: SetMembershipBrandHueInput!) {
  setMembershipBrandHue(input: $input) {
    ...Membership
  }
}
