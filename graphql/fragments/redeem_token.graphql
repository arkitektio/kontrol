fragment ListRedeemToken on ManagementRedeemToken {
  id
  token
  createdAt
  expiresAt
  composition {
    id
    name
    organization {
      id
      name
    }
  }
  user {
    id
    email
  }
  client {
    id
    release {
      version
      app {
        identifier
      }
    }
  }
}

fragment DetailRedeemToken on ManagementRedeemToken {
  ...ListRedeemToken
}
