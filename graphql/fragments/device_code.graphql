fragment DeviceCode on ManagementDeviceCode {
  id
  code 
  stagingKind
  stagingManifest {
    identifier
    version
    nodeId
    logo
    description
    url
    repoUrl
    scopes
    requirements {
      key
      service
      optional
      description
    }
    publicSources {
      kind
      url
    }
  }
  client {
    id
    kind
    name
    release {
      version
      scopes
      app {
        identifier
      }
    }
  }
}