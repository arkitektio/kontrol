fragment Manifest on ManagementStagingManifest {
  identifier
  version
  requirements {
    key
    description
  }
}

fragment ServiceManifest on ManagementStagingServiceManifest {
  identifier
  version
  logo
  description
  roles {
    key
    description
  }
  scopes {
    key
    description
  }
  publicSources {
    kind
    url
  }
}


fragment HubManifest on ManagementHubManifest {
  identifier
  instances {
    manifest {
      ...ServiceManifest
    }
    description
    identifier
    aliases {
      id
      name
      kind
      scope
      ssl
      host
      port
      path
      public
    }
  }
  clients {
    manifest {
      ...Manifest
    }
    description
    identifier
  }
}