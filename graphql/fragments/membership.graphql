fragment Membership on ManagementMembership {
  id
  brandHue
  roles {
    identifier
    id
  }
  roleRequests {
    ...RoleRequest
  }
  user {
    id
    username
    email
    profile {
      id
      avatar {
        presignedUrl
      }
    }
  }
  organization {
    ...ListOrganization
    roles {
        id
        identifier
        description
    }
    roleSets {
      ...RoleSet
    }
  }
}

fragment ListMembership on ManagementMembership {
  id
  brandHue
  roles {
    identifier
    id
  }
  user {
    id
    username
    profile {
      id
      avatar {
        presignedUrl
      }
    }
  }
  organization {
    ...SidebarOrganization
  }
}